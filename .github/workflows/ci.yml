name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Every Sunday 03:00 UTC
    - cron: '0 3 * * 0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        shell: pwsh
        run: choco install llvm --yes --no-progress

      - name: Build (NoRun)
        shell: pwsh
        run: .\scripts\build.ps1 -NoRun -StrictDisk

  smoke:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and QEMU
        shell: pwsh
        run: |
          choco install llvm --yes --no-progress
          choco install qemu --yes --no-progress

      - name: Smoke Boot
        shell: pwsh
        run: .\scripts\build.ps1 -Smoke -StrictDisk

      - name: Upload Smoke Logs On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-smoke-logs
          path: |
            qemu-smoke.log
            qemu-smoke.stdout.log
            qemu-smoke.stderr.log
          if-no-files-found: warn
